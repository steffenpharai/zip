; ZIP V2 — ESP32-S3 OV2640 in STA mode (Phase 3.3 AFT camera).
;
; Joins the home Wi-Fi, hosts an HTTP MJPEG server on :81/stream.
; Jetson's zip-brain proxies /cam/aft → http://<this device>:81/stream.
;
; This is a small fresh project, intentionally separate from the V1
; zip_esp32_cam firmware which is AP-mode and has a much heavier task
; architecture we don't need for "just stream a camera".

[env:esp32cam_sta]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_freq = 80m
; Same memory_type as the V1 firmware — quad flash + octal PSRAM.
board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_HTTPD_MAX_REQ_HDR_LEN=1024
    -I include

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

upload_speed = 460800
upload_flags =
    --before=default_reset
    --after=hard_reset
    --chip=esp32s3

; No external lib_deps — esp_camera is bundled with Arduino-ESP32 v2.x.
lib_deps =
