/**:
  ros__parameters:
    # VLM (Vision Language Model) Configuration
    # Qwen2.5-VL-3B with TensorRT-LLM
    
    # Model path (TensorRT-LLM engine directory)
    model_path: ""
    
    # Quantization level (4-bit or 8-bit)
    quantization: "int4"  # Options: int4, int8, fp16
    
    # Maximum number of tokens in response
    max_tokens: 512
    
    # Temperature for text generation (0.0 to 1.0)
    temperature: 0.7
    
    # Top-p sampling parameter
    top_p: 0.9
    
    # System prompt for scene description
    system_prompt: "Describe this scene in detail, including all visible objects and their relationships. Be concise but informative."
    
    # Use detections from YOLO11 as context
    use_detections_context: true
    
    # Inference frequency (process every Nth frame)
    # Set to 1 to process every frame, 5 to process every 5th frame, etc.
    inference_frequency: 5
    
    # Device (GPU or CPU)
    device: "GPU"
    
    # TensorRT-LLM settings
    # Batch size (usually 1 for real-time inference)
    batch_size: 1
    
    # Maximum sequence length
    max_sequence_length: 2048
